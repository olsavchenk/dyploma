# Stride reverse proxy & SPA host
# -----------------------------------------------------------------------------
# Notes:
# - Self-signed cert blocks SW registration on test devices —
#   install local CA in trusted roots before testing PWA install / SW updates.
# - `server_tokens off` and security headers harden the surface (M-4, H-7).
# - HTTP/2 enabled for static asset multiplexing (M-13).
# - gzip is on; brotli is gated behind nginx-extras (H-13).
# -----------------------------------------------------------------------------

# Hide nginx version from Server: header / error pages (M-4)
server_tokens off;

# --- HTTP/1.1 gzip compression (H-13) ---------------------------------------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    application/javascript application/json application/xml
    text/css text/plain text/xml application/wasm
    image/svg+xml font/woff font/woff2;

# brotli — only effective when ngx_brotli module is loaded (requires nginx-extras)
# brotli on;
# brotli_comp_level 6;
# brotli_types application/javascript application/json text/css text/plain image/svg+xml font/woff2;

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    # http2 enables multiplexing for static asset bundles (M-13)
    # http3/quic available on nginx-quic builds: `listen 443 quic reuseport;`
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /opt/stride/certs/stride.crt;
    ssl_certificate_key /opt/stride/certs/stride.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /opt/stride/dist/browser;
    index index.html;

    # --- Security response headers (H-7) ------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss: https:;" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # --- PWA service-worker assets (CR-5) -----------------------------------
    # Must resolve as STATIC files BEFORE the SPA fallback; otherwise
    # `try_files $uri /index.html` returns HTML for /ngsw-worker.js and the
    # browser refuses to register the service worker (MIME type mismatch).
    location ~ ^/(ngsw-worker|ngsw|service-worker|safety-worker).*\.(js|json)$ {
        try_files $uri =404;
        # SW registration script must never be cached for long, or updates stall
        add_header Cache-Control "no-cache" always;
        add_header Service-Worker-Allowed "/" always;
    }

    # --- Long-lived hashed static bundles (M-12) ----------------------------
    # Angular CLI emits content-hashed filenames; safe to cache for a year.
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Angular — fall through to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Main API
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 600s;

        # API responses must NOT be cached by the SW; the SW dataGroups
        # in ngsw-config.json own caching strategy per-endpoint (M-15).
        add_header Cache-Control "no-store" always;
    }

    # Adaptive ML API
    location /adaptive/ {
        rewrite ^/adaptive/(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:5010;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        add_header Cache-Control "no-store" always;
    }

    # SignalR WebSockets
    location /hubs/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # Health endpoint (direct passthrough)
    location = /health {
        proxy_pass         http://127.0.0.1:5000/health;
        access_log         off;
    }

    # MinIO object storage (avatars, assets) — strip /storage prefix
    location /storage/ {
        rewrite ^/storage/(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
    }

    # Static angular assets (i18n, icons) — public cacheable (M-15 confirm)
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }

    client_max_body_size 25M;
}
