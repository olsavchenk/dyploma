<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Stride — Офлайн</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .offline-container {
      text-align: center;
      padding: 2rem;
      max-width: 500px;
    }

    .offline-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .offline-icon svg {
      width: 60px;
      height: 60px;
      fill: #667eea;
    }

    .offline-content {
      background: white;
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 2rem;
      font-weight: 500;
      margin-bottom: 1rem;
      color: #1a202c;
    }

    p {
      font-size: 1.125rem;
      line-height: 1.6;
      color: #4a5568;
      margin-bottom: 2rem;
    }

    .retry-button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 1rem 2.5rem;
      font-size: 1rem;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(102, 126, 234, 0.4);
    }

    .retry-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    .retry-button:active {
      transform: translateY(0);
    }

    .offline-tips {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid #e2e8f0;
    }

    .offline-tips h2 {
      font-size: 1rem;
      font-weight: 500;
      color: #2d3748;
      margin-bottom: 1rem;
    }

    .offline-tips ul {
      list-style: none;
      text-align: left;
    }

    .offline-tips li {
      padding: 0.5rem 0;
      color: #718096;
      font-size: 0.9375rem;
    }

    .offline-tips li::before {
      content: "✓ ";
      color: #667eea;
      font-weight: bold;
      margin-right: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" opacity="0.3"/>
        <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z" opacity="0"/>
        <path d="M12 4C9.79 4 7.79 4.86 6.29 6.29L4.88 4.88C6.78 2.98 9.29 2 12 2s5.22.98 7.12 2.88l-1.41 1.41C16.21 4.86 14.21 4 12 4zm0 4c1.38 0 2.63.56 3.54 1.46l-1.41 1.41C13.63 10.37 12.86 10 12 10s-1.63.37-2.12.88L8.46 9.46C9.37 8.56 10.62 8 12 8zm0 4c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/>
      </svg>
    </div>

    <div class="offline-content">
      <h1>Ви офлайн</h1>
      <p>Схоже, у вас немає підключення до інтернету. Перевірте своє з'єднання та спробуйте ще раз.</p>
      
      <button class="retry-button" onclick="window.location.reload()">
        Спробувати ще раз
      </button>

      <div class="offline-tips">
        <h2>Що можна зробити:</h2>
        <ul>
          <li>Перевірте Wi-Fi або мобільні дані</li>
          <li>Увімкніть режим літака на кілька секунд</li>
          <li>Перезавантажте роутер</li>
          <li>Деякі сторінки можуть бути доступні офлайн</li>
        </ul>
      </div>
    </div>
  </div>
</body>
</html>
