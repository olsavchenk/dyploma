<mat-toolbar color="primary" class="app-header">
  <!-- Menu Toggle (Mobile) -->
  <button
    mat-icon-button
    class="menu-toggle md:hidden"
    (click)="onMenuToggle()"
    aria-label="Toggle menu"
  >
    <mat-icon>menu</mat-icon>
  </button>

  <!-- Logo -->
  <a routerLink="/" class="logo-container">
    <img src="assets/images/logo.svg" alt="Stride" class="logo" />
    <span class="logo-text hidden md:inline">Stride</span>
  </a>

  <div class="spacer"></div>

  @if (isAuthenticated() && showStats()) {
    <!-- Streak Counter -->
    @if (userStats(); as stats) {
      <div class="stat-item streak-counter" matTooltip="Поточна серія">
        <mat-icon class="streak-icon">local_fire_department</mat-icon>
        <span class="stat-value">{{ stats.currentStreak }}</span>
      </div>

      <!-- XP Mini-Bar -->
      <div class="stat-item xp-bar-container hidden md:flex" matTooltip="XP до наступного рівня">
        <div class="xp-info">
          <mat-icon class="xp-icon">stars</mat-icon>
          <span class="level-badge">{{ stats.currentLevel }}</span>
        </div>
        <div class="xp-progress">
          <div
            class="xp-progress-fill"
            [style.width.%]="xpPercentage()"
            [attr.aria-valuenow]="xpPercentage()"
            [attr.aria-valuemin]="0"
            [attr.aria-valuemax]="100"
            role="progressbar"
          ></div>
        </div>
        <span class="xp-text hidden lg:inline">{{ stats.totalXp }} XP</span>
      </div>
    }

    <!-- Notification Bell -->
    <button
      mat-icon-button
      class="notification-button"
      [matBadge]="notificationCount()"
      [matBadgeHidden]="notificationCount() === 0"
      matBadgeColor="warn"
      matBadgeSize="small"
      aria-label="Notifications"
    >
      <mat-icon>notifications</mat-icon>
    </button>

    <!-- Avatar Menu -->
    <button
      mat-icon-button
      [matMenuTriggerFor]="userMenu"
      class="avatar-button"
      aria-label="User menu"
    >
      <img [src]="getAvatarUrl()" [alt]="getUserDisplayName()" class="avatar-image" />
    </button>

    <mat-menu #userMenu="matMenu" xPosition="before">
      <div class="user-menu-header" mat-menu-item disabled>
        <div class="user-info">
          <span class="user-name">{{ getUserDisplayName() }}</span>
          <span class="user-email">{{ getUserEmail() }}</span>
        </div>
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="navigateToProfile()">
        <mat-icon>person</mat-icon>
        <span>Профіль</span>
      </button>
      <button mat-menu-item (click)="navigateToSettings()">
        <mat-icon>settings</mat-icon>
        <span>Налаштування</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="onLogout()">
        <mat-icon>logout</mat-icon>
        <span>Вийти</span>
      </button>
    </mat-menu>
  }
</mat-toolbar>
