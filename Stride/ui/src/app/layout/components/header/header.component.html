<header class="app-header" role="banner">
  <!-- Mobile menu toggle -->
  <button
    mat-icon-button
    class="menu-toggle"
    (click)="onMenuToggle()"
    [attr.aria-label]="'layout.header.openMenu' | translate"
  >
    <mat-icon>menu</mat-icon>
  </button>

  <!-- Brand mark -->
  <a routerLink="/dashboard" class="brand sun-underline" [attr.aria-label]="'layout.header.brandHome' | translate">
    <span class="brand-text font-display">{{ 'auth.brand.headline' | translate }}</span>
  </a>

  <div class="header-spacer"></div>

  @if (isAuthenticated() && showStats()) {
    <!-- Streak mini-chip -->
    @if (userStats(); as stats) {
      <div
        class="streak-chip"
        [matTooltip]="'layout.header.streakTooltip' | translate:{ count: stats.currentStreak }"
        matTooltipPosition="below"
      >
        <mat-icon class="streak-icon">local_fire_department</mat-icon>
        <span class="streak-count font-mono">{{ stats.currentStreak }}</span>
      </div>

      <!-- XP mini-bar (desktop only) -->
      <div
        class="xp-bar-widget hidden md:flex"
        [matTooltip]="stats.totalXp + ' / ' + stats.xpToNextLevel + ' XP'"
        matTooltipPosition="below"
      >
        <span class="level-chip font-mono">{{ stats.currentLevel }}</span>
        <div class="xp-track" role="progressbar"
             [attr.aria-valuenow]="xpPercentage()"
             aria-valuemin="0" aria-valuemax="100">
          <div class="xp-fill sun-gradient" [style.width.%]="xpPercentage()"></div>
        </div>
      </div>
    }

    <!-- Language toggle -->
    <div class="lang-toggle hidden sm:flex" role="group" [attr.aria-label]="'layout.header.languageGroup' | translate">
      <button class="lang-btn font-sans" [class.active]="currentLang() === 'uk'" (click)="setLang('uk')">УК</button>
      <span class="lang-sep">|</span>
      <button class="lang-btn font-sans" [class.active]="currentLang() === 'en'" (click)="setLang('en')">EN</button>
    </div>

    <!-- Notification bell -->
    <button
      mat-icon-button
      class="notif-btn"
      (click)="notificationPanelToggle.emit()"
      [matBadge]="notificationCount()"
      [matBadgeHidden]="notificationCount() === 0"
      matBadgeColor="warn"
      matBadgeSize="small"
      [attr.aria-label]="'layout.header.notifications' | translate"
    >
      <mat-icon>notifications</mat-icon>
    </button>

    <!-- Avatar menu -->
    <button
      mat-icon-button
      [matMenuTriggerFor]="userMenu"
      class="avatar-btn"
      [attr.aria-label]="'layout.header.userMenu' | translate"
    >
      <img [src]="getAvatarUrl()" [alt]="getUserDisplayName()" class="avatar-img" />
    </button>

    <mat-menu #userMenu="matMenu" xPosition="before">
      <div class="user-menu-header" mat-menu-item disabled>
        <span class="user-name font-sans">{{ getUserDisplayName() }}</span>
        <span class="user-email font-sans">{{ getUserEmail() }}</span>
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="navigateToProfile()">
        <mat-icon>person</mat-icon>
        <span>{{ 'layout.header.profile' | translate }}</span>
      </button>
      <button mat-menu-item (click)="navigateToSettings()">
        <mat-icon>settings</mat-icon>
        <span>{{ 'layout.header.settings' | translate }}</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="onLogout()">
        <mat-icon>logout</mat-icon>
        <span>{{ 'layout.header.logout' | translate }}</span>
      </button>
    </mat-menu>
  }
</header>
