<div class="dashboard">
  <!-- Header -->
  <div class="dashboard-header">
    <h1 class="dashboard-title">Панель вчителя</h1>
    <p class="dashboard-subtitle">Огляд вашої навчальної діяльності</p>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-grid" *ngIf="!loading(); else loadingSkeleton">
    <!-- Класи -->
    <div class="kpi-card">
      <div class="kpi-icon kpi-icon--blue">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </div>
      <div class="kpi-body">
        <span class="kpi-value">{{ stats()?.classes ?? 0 }}</span>
        <span class="kpi-label">Класи</span>
      </div>
    </div>

    <!-- Учні -->
    <div class="kpi-card">
      <div class="kpi-icon kpi-icon--sun">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
      </div>
      <div class="kpi-body">
        <span class="kpi-value">{{ stats()?.students ?? 0 }}</span>
        <span class="kpi-label">Учні</span>
      </div>
    </div>

    <!-- На перевірці -->
    <div class="kpi-card">
      <div class="kpi-icon kpi-icon--orange">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
      </div>
      <div class="kpi-body">
        <span class="kpi-value">{{ stats()?.pendingReviews ?? 0 }}</span>
        <span class="kpi-label">На перевірці</span>
      </div>
    </div>

    <!-- XP за тиждень -->
    <div class="kpi-card">
      <div class="kpi-icon kpi-icon--green">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
          <polyline points="17 6 23 6 23 12"></polyline>
        </svg>
      </div>
      <div class="kpi-body">
        <span class="kpi-value">{{ stats()?.weekXp ?? 0 }}</span>
        <span class="kpi-label">XP за тиждень</span>
      </div>
    </div>
  </div>

  <!-- Loading skeleton -->
  <ng-template #loadingSkeleton>
    <div class="kpi-grid">
      <div class="kpi-card kpi-card--skeleton" *ngFor="let i of [1,2,3,4]">
        <div class="skeleton-icon"></div>
        <div class="skeleton-body">
          <div class="skeleton-value"></div>
          <div class="skeleton-label"></div>
        </div>
      </div>
    </div>
  </ng-template>

  <!-- Recent Activity -->
  <div class="section">
    <h2 class="section-title">Останні класи</h2>

    <div class="activity-list" *ngIf="recentActivity().length > 0; else noActivity">
      <div class="activity-item" *ngFor="let item of recentActivity()">
        <div class="activity-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          </svg>
        </div>
        <div class="activity-body">
          <span class="activity-text">{{ item.text }}</span>
          <span class="activity-time">{{ item.time }}</span>
        </div>
      </div>
    </div>

    <ng-template #noActivity>
      <div class="empty-activity">
        <p>Немає нещодавньої активності</p>
        <button class="btn-primary" (click)="navigateToClasses()">Переглянути класи</button>
      </div>
    </ng-template>
  </div>
</div>
