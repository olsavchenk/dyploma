<div class="subjects-page">
  <div class="page-header">
    <h1 class="page-title">Предмети</h1>
    <button mat-flat-button color="primary" class="add-btn" (click)="openCreate()">
      <mat-icon>add</mat-icon>
      Новий предмет
    </button>
  </div>

  @if (loading()) {
    <div class="spinner-wrap">
      <mat-spinner diameter="48"></mat-spinner>
    </div>
  } @else {
    <div class="table-card">
      <table mat-table [dataSource]="subjects()" class="subjects-table">

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Назва</th>
          <td mat-cell *matCellDef="let row">{{ row.name }}</td>
        </ng-container>

        <ng-container matColumnDef="slug">
          <th mat-header-cell *matHeaderCellDef>Slug</th>
          <td mat-cell *matCellDef="let row"><code class="slug">{{ row.slug }}</code></td>
        </ng-container>

        <ng-container matColumnDef="sortOrder">
          <th mat-header-cell *matHeaderCellDef>Порядок</th>
          <td mat-cell *matCellDef="let row">{{ row.sortOrder }}</td>
        </ng-container>

        <ng-container matColumnDef="isActive">
          <th mat-header-cell *matHeaderCellDef>Активний</th>
          <td mat-cell *matCellDef="let row">
            <mat-icon [class.active]="row.isActive" [class.inactive]="!row.isActive">
              {{ row.isActive ? 'check_circle' : 'cancel' }}
            </mat-icon>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Дії</th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button matTooltip="Редагувати" (click)="openEdit(row)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button matTooltip="Видалити" color="warn" (click)="delete(row)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      @if (subjects().length === 0) {
        <div class="empty-state">
          <mat-icon>menu_book</mat-icon>
          <p>Предметів ще немає</p>
        </div>
      }

      <div class="table-footer">
        <span class="total-label">Всього: {{ total() }}</span>
      </div>
    </div>
  }
</div>
