<div class="select-role-page">
  <div class="select-role-inner">
    <div class="page-header">
      <div class="brand-mark">
        <span class="brand-mark-letter font-display">С</span>
      </div>
      <h1 class="page-title font-display">Оберіть свою роль</h1>
      <p class="page-subtitle font-sans">Це допоможе нам налаштувати ваш досвід</p>
    </div>

    @if (errorMessage()) {
      <div class="error-banner" role="alert">
        <mat-icon>error_outline</mat-icon>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <div class="role-cards">
      <button
        class="role-card"
        [class.role-card--selected]="selectedRole() === 'Student'"
        [class.role-card--disabled]="isSubmitting()"
        (click)="selectRole('Student')"
        type="button"
        role="radio"
        [attr.aria-checked]="selectedRole() === 'Student'"
        aria-label="Обрати роль Учень"
      >
        <div class="role-card-accent role-card-accent--student"></div>
        <div class="role-icon-wrap role-icon-wrap--student">
          <mat-icon class="role-icon">school</mat-icon>
        </div>
        <h3 class="role-name font-display">Учень</h3>
        <p class="role-desc font-sans">Навчайтесь та здобувайте досягнення</p>
        @if (selectedRole() === 'Student') {
          <div class="role-check">
            <mat-icon>check_circle</mat-icon>
          </div>
        }
      </button>

      <button
        class="role-card"
        [class.role-card--selected]="selectedRole() === 'Teacher'"
        [class.role-card--disabled]="isSubmitting()"
        (click)="selectRole('Teacher')"
        type="button"
        role="radio"
        [attr.aria-checked]="selectedRole() === 'Teacher'"
        aria-label="Обрати роль Вчитель"
      >
        <div class="role-card-accent role-card-accent--teacher"></div>
        <div class="role-icon-wrap role-icon-wrap--teacher">
          <mat-icon class="role-icon">cast_for_education</mat-icon>
        </div>
        <h3 class="role-name font-display">Вчитель</h3>
        <p class="role-desc font-sans">Керуйте класами та аналізуйте прогрес</p>
        @if (selectedRole() === 'Teacher') {
          <div class="role-check">
            <mat-icon>check_circle</mat-icon>
          </div>
        }
      </button>
    </div>

    <div class="actions">
      <button
        mat-flat-button
        class="confirm-btn"
        (click)="confirmSelection()"
        [disabled]="!selectedRole() || isSubmitting()"
        type="button"
      >
        @if (isSubmitting()) {
          <mat-spinner diameter="20" class="btn-spinner"></mat-spinner>
          <span>Збереження...</span>
        } @else {
          <span>Продовжити</span>
          <mat-icon>arrow_forward</mat-icon>
        }
      </button>
    </div>

    <p class="help-text font-sans">Ви зможете змінити роль пізніше в налаштуваннях</p>
  </div>
</div>
